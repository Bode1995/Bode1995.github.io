<!doctype html><html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Orb Catcher</title>
<style>body{margin:0;overflow:hidden;background:#070912;color:#fff;font-family:system-ui}#ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.box{padding:8px 12px;background:rgba(5,8,20,.7);border:1px solid #5670c7;border-radius:10px}a{color:#beddff}</style>
</head><body>
<div id="ui"><div class="box">Gefangen: <b id="score">0</b></div><div class="box"><a href="index.html">⬅ Menü</a> · Maus links/rechts</div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,80);camera.position.set(0,7,12);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xb6c4ff,0x1b2239,1.2));
const paddle=new THREE.Mesh(new THREE.BoxGeometry(2.6,.5,2.6),new THREE.MeshStandardMaterial({color:0x7af8ff}));paddle.position.y=.3;scene.add(paddle);
let pointerX=0;addEventListener('pointermove',e=>{pointerX=(e.clientX/innerWidth)*2-1;});
const balls=[];for(let i=0;i<12;i++){const b=new THREE.Mesh(new THREE.SphereGeometry(.35,16,16),new THREE.MeshStandardMaterial({color:0xff86c5,emissive:0x661a44}));b.position.set((Math.random()-.5)*8,3+Math.random()*10,(Math.random()-.5)*8);scene.add(b);balls.push(b);}let score=0;
function reset(b){b.position.set((Math.random()-.5)*8,9+Math.random()*7,(Math.random()-.5)*8);} 
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
function loop(){paddle.position.x+=(pointerX*5-paddle.position.x)*0.2;for(const b of balls){b.position.y-=0.07;if(b.position.y<0.4&&Math.abs(b.position.x-paddle.position.x)<1.4&&Math.abs(b.position.z-paddle.position.z)<1.4){score++;document.getElementById('score').textContent=score;reset(b);}if(b.position.y<-1)reset(b);}renderer.render(scene,camera);requestAnimationFrame(loop);}loop();
</script></body></html>
