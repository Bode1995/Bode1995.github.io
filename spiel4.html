<!doctype html><html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Jump Run</title>
<style>body{margin:0;overflow:hidden;background:#080b12;color:#fff;font-family:system-ui}#ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.box{padding:8px 12px;background:rgba(5,8,20,.7);border:1px solid #5670c7;border-radius:10px}a{color:#beddff}</style>
</head><body>
<div id="ui"><div class="box">Punkte: <b id="score">0</b></div><div class="box"><a href="index.html">⬅ Menü</a> · Space/Tippen</div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(66,innerWidth/innerHeight,.1,90);camera.position.set(0,3.5,9);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xa3b8ff,0x1d2138,1.2));
const floor=new THREE.Mesh(new THREE.BoxGeometry(14,.4,60),new THREE.MeshStandardMaterial({color:0x1f2940}));floor.position.set(0,-.2,-20);scene.add(floor);
const player=new THREE.Mesh(new THREE.SphereGeometry(.6,18,18),new THREE.MeshStandardMaterial({color:0x77f6ff}));player.position.y=.6;scene.add(player);
const obs=[];for(let i=0;i<8;i++){const o=new THREE.Mesh(new THREE.BoxGeometry(1,1.4,1),new THREE.MeshStandardMaterial({color:0xff7f9d}));o.position.set(0,.7,-8-i*7);scene.add(o);obs.push(o);} 
let vy=0,score=0,dead=false;
function jump(){if(player.position.y<=.62){vy=.2;}}
addEventListener('keydown',e=>{if(e.code==='Space')jump();});addEventListener('pointerdown',jump);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
function loop(){if(!dead){vy-=0.01;player.position.y=Math.max(.6,player.position.y+vy);if(player.position.y===.6)vy=0;for(const o of obs){o.position.z+=0.25;if(o.position.z>4){o.position.z=-55-Math.random()*18;score++;document.getElementById('score').textContent=score;}if(Math.abs(o.position.z-player.position.z)<.9&&player.position.y<1.3){dead=true;document.getElementById('score').textContent='Crash!';}}}renderer.render(scene,camera);requestAnimationFrame(loop);}loop();
</script></body></html>
