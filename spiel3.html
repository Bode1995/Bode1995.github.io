<!doctype html><html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Block Stacker</title>
<style>body{margin:0;overflow:hidden;background:#0a0a13;color:#fff;font-family:system-ui}#ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.box{padding:8px 12px;background:rgba(5,8,20,.7);border:1px solid #5670c7;border-radius:10px}a{color:#beddff}</style>
</head><body>
<div id="ui"><div class="box">Höhe: <b id="height">0</b></div><div class="box"><a href="index.html">⬅ Menü</a> · Leertaste</div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a13);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,100);camera.position.set(8,10,12);camera.lookAt(0,3,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xc2d5ff,0x2a1f3e,1.1));
const ground=new THREE.Mesh(new THREE.BoxGeometry(20,.5,20),new THREE.MeshStandardMaterial({color:0x24243c}));ground.position.y=-.25;scene.add(ground);
let stackHeight=0;let active;
function makeBlock(y){const b=new THREE.Mesh(new THREE.BoxGeometry(2,.6,2),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),.65,.55)}));b.position.set(-5,y,0);scene.add(b);return b;}
active=makeBlock(.3);
let dir=1;let running=true;
function drop(){if(!running)return;const targetX=0; if(Math.abs(active.position.x-targetX)>1.3){running=false;document.getElementById('height').textContent='Game Over';return;} active.position.x=targetX;stackHeight++;document.getElementById('height').textContent=stackHeight;active=makeBlock(.3+stackHeight*.62);camera.position.y=10+stackHeight*.5;camera.lookAt(0,stackHeight*.6,0);}
addEventListener('keydown',e=>{if(e.code==='Space')drop();});addEventListener('pointerdown',drop);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
function loop(){if(running){active.position.x+=0.08*dir;if(active.position.x>5||active.position.x<-5)dir*=-1;}renderer.render(scene,camera);requestAnimationFrame(loop);}loop();
</script></body></html>
