<!doctype html><html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Orbit Shooter</title>
<style>body{margin:0;overflow:hidden;background:#05060f;color:#fff;font-family:system-ui}#ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.box{padding:8px 12px;background:rgba(5,8,20,.7);border:1px solid #5670c7;border-radius:10px}a{color:#beddff}</style>
</head><body>
<div id="ui"><div class="box">Treffer: <b id="score">0</b></div><div class="box"><a href="index.html">⬅ Menü</a> · Tippen/Klicken</div></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,100);camera.position.set(0,0,12);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xa6b5ff,0x25183f,1.3));
const core=new THREE.Mesh(new THREE.SphereGeometry(1,24,24),new THREE.MeshStandardMaterial({color:0x7bf5ff,emissive:0x0f5a7a}));scene.add(core);
const targets=[];for(let i=0;i<7;i++){const t=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),new THREE.MeshStandardMaterial({color:0xff93ab}));scene.add(t);targets.push(t);} 
const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();let score=0;
addEventListener('pointerdown',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;raycaster.setFromCamera(mouse,camera);const hit=raycaster.intersectObjects(targets)[0];if(hit){score++;document.getElementById('score').textContent=score;hit.object.userData.offset=Math.random()*Math.PI*2;}});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
function loop(t){core.rotation.y+=0.01;targets.forEach((o,i)=>{const a=t*0.001+i*0.9+(o.userData.offset||0);const r=3.8+Math.sin(t*0.001+i)*0.5;o.position.set(Math.cos(a)*r,Math.sin(a*1.4)*2,Math.sin(a)*r);o.rotation.x+=0.02;o.rotation.y+=0.01;});renderer.render(scene,camera);requestAnimationFrame(loop);}loop(0);
</script></body></html>
