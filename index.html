<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Mini-Arcade</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #1f2a5e 0%, #090b16 60%);
        color: #ecf1ff;
      }
      main {
        width: min(900px, 92vw);
        padding: 28px;
        border-radius: 20px;
        background: rgba(15, 19, 40, 0.75);
        border: 1px solid rgba(151, 174, 255, 0.35);
        box-shadow: 0 20px 50px rgba(0,0,0,.4);
      }
      h1 { text-align: center; margin: 0 0 10px; }
      p { text-align: center; margin: 0 0 24px; color: #bfd0ff; }
      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      a {
        text-decoration: none;
        padding: 16px;
        border-radius: 14px;
        border: 1px solid rgba(149, 182, 255, 0.35);
        background: linear-gradient(135deg, rgba(88,130,255,.24), rgba(114,236,255,.18));
        color: #f4f7ff;
        font-weight: 700;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      small { color: #c8d6ff; font-weight: 500; }
    </style>
  </head>
  <body>
    <main>
      <h1>3D Mini-Arcade</h1>
      <p>Wähle eins von sechs kleinen 3D-Spielen.</p>
      <div class="grid">
        <a href="spiel1.html">1. Kristall-Klicker <small>Triff schwebende Ziele</small></a>
        <a href="spiel2.html">2. Lane Dodger <small>Weiche Hindernissen aus</small></a>
        <a href="spiel3.html">3. Block Stacker <small>Timing beim Stapeln</small></a>
        <a href="spiel4.html">4. Jump Run <small>Spring über Barrieren</small></a>
        <a href="spiel5.html">5. Orb Catcher <small>Fang fallende Kugeln</small></a>
        <a href="spiel6.html">6. Orbit Shooter <small>Schieße Ziele im Ring</small></a>
      </div>
    </main>
  </body>
</html>
