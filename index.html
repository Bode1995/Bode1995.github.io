<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Neon Skyline Rush</title>
    <style>
      :root {
        color-scheme: dark;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 30%, #2b2d63 0%, #090811 70%);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        touch-action: none;
      }

      canvas {
        display: block;
      }

      .hud {
        position: fixed;
        top: calc(var(--safe-top) + 12px);
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
        z-index: 10;
      }

      .badge {
        background: rgba(6, 10, 24, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 8px 12px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      }

      .label {
        color: #8ac2ff;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .value {
        color: #fff;
        font-size: 21px;
        font-weight: 700;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(5, 8, 18, 0.72), rgba(5, 8, 18, 0.92));
        z-index: 30;
        transition: opacity 300ms ease;
      }

      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .card {
        width: min(88vw, 420px);
        border-radius: 24px;
        background: rgba(12, 18, 38, 0.82);
        border: 1px solid rgba(129, 167, 255, 0.36);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
        padding: 22px;
        text-align: center;
        color: #e8ecff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(30px, 7vw, 46px);
      }

      p {
        line-height: 1.45;
        color: #c5d5ff;
      }

      button {
        margin-top: 14px;
        border: none;
        border-radius: 999px;
        padding: 14px 24px;
        width: 100%;
        font-size: 18px;
        font-weight: 700;
        color: #10142a;
        background: linear-gradient(135deg, #74f3ff, #9f97ff);
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .pill {
        flex: 1;
        font-size: 14px;
        border-radius: 999px;
        padding: 6px;
        background: rgba(143, 173, 255, 0.18);
        color: #e6f0ff;
      }

      .bottom-tip {
        position: fixed;
        bottom: calc(var(--safe-bottom) + 14px);
        width: 100%;
        text-align: center;
        color: rgba(232, 236, 255, 0.84);
        font-size: 13px;
        z-index: 8;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.36);
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <div class="badge">
        <div class="label">Punkte</div>
        <div id="score" class="value">0</div>
      </div>
      <div class="badge">
        <div class="label">Tempo</div>
        <div id="speed" class="value">1.0x</div>
      </div>
    </div>

    <div class="bottom-tip">Wische links/rechts · Tippe zum Springen</div>

    <div id="overlay" class="overlay">
      <div class="card">
        <h1>Neon Skyline Rush</h1>
        <p>
          Fliege durch eine futuristische Stadt. Sammle Kristalle, meide Hürden und knacke deinen Highscore.
          Optimiert für iPhone Safari mit Touch-Steuerung.
        </p>
        <div class="controls">
          <span class="pill">👈👉 Spurwechsel</span>
          <span class="pill">🟣 Tippen = Sprung</span>
        </div>
        <button id="startButton">Spiel starten</button>
      </div>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x090811, 20, 120);

      const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 280);
      camera.position.set(0, 4, 12);

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.HemisphereLight(0x7fc5ff, 0x1e0f2f, 0.8);
      scene.add(ambient);

      const sun = new THREE.DirectionalLight(0xb1c9ff, 1.2);
      sun.position.set(4, 12, 4);
      scene.add(sun);

      const laneX = [-3.3, 0, 3.3];
      const track = new THREE.Group();
      scene.add(track);

      const floorMat = new THREE.MeshStandardMaterial({ color: 0x182038, roughness: 0.72, metalness: 0.15 });
      const lineMat = new THREE.MeshStandardMaterial({ color: 0x47d4ff, emissive: 0x2075b8, emissiveIntensity: 1.35 });
      const floorGeo = new THREE.BoxGeometry(12, 0.5, 32);
      const stripeGeo = new THREE.BoxGeometry(0.14, 0.02, 32);

      const segments = [];
      for (let i = 0; i < 8; i++) {
        const segment = new THREE.Group();
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -1;
        segment.add(floor);

        for (const x of [-4, -1.3, 1.3, 4]) {
          const stripe = new THREE.Mesh(stripeGeo, lineMat);
          stripe.position.set(x, -0.74, 0);
          segment.add(stripe);
        }

        segment.position.z = -i * 31.5;
        track.add(segment);
        segments.push(segment);
      }

      const starGeo = new THREE.SphereGeometry(0.04, 6, 6);
      const starMat = new THREE.MeshBasicMaterial({ color: 0x9ec7ff });
      const stars = new THREE.InstancedMesh(starGeo, starMat, 450);
      const starDummy = new THREE.Object3D();
      for (let i = 0; i < 450; i++) {
        starDummy.position.set((Math.random() - 0.5) * 120, Math.random() * 45 + 4, -Math.random() * 220);
        starDummy.updateMatrix();
        stars.setMatrixAt(i, starDummy.matrix);
      }
      scene.add(stars);

      const player = new THREE.Group();
      const orb = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.9, 2),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x883bff, emissiveIntensity: 1.3, metalness: 0.35, roughness: 0.22 })
      );
      player.add(orb);
      const trail = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.6, 1.6, 12, 1, true),
        new THREE.MeshStandardMaterial({ color: 0x74f3ff, emissive: 0x1dafff, emissiveIntensity: 1.4, transparent: true, opacity: 0.58 })
      );
      trail.rotation.x = Math.PI / 2;
      trail.position.z = 1;
      trail.position.y = -0.2;
      player.add(trail);
      player.position.set(0, 0, 3.2);
      scene.add(player);

      const items = [];
      const obstacleGeo = new THREE.BoxGeometry(1.8, 2.2, 1.8);
      const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xff4f8f, emissive: 0x7a1e4c, emissiveIntensity: 0.7, roughness: 0.35 });
      const crystalGeo = new THREE.OctahedronGeometry(0.52, 0);
      const crystalMat = new THREE.MeshStandardMaterial({ color: 0x7df9ff, emissive: 0x39c4ff, emissiveIntensity: 1.25, metalness: 0.45, roughness: 0.15 });

      function spawnRow(z) {
        const chanceObstacle = Math.random();
        const lanes = [0, 1, 2];
        const obstacleCount = chanceObstacle < 0.7 ? 1 : 2;
        for (let i = 0; i < obstacleCount; i++) {
          const lane = lanes.splice(Math.floor(Math.random() * lanes.length), 1)[0];
          const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
          obstacle.position.set(laneX[lane], 0.1, z);
          obstacle.castShadow = false;
          scene.add(obstacle);
          items.push({ mesh: obstacle, lane, z, type: "obstacle" });
        }

        if (Math.random() > 0.18) {
          const safeLane = lanes[Math.floor(Math.random() * lanes.length)] ?? Math.floor(Math.random() * 3);
          const crystal = new THREE.Mesh(crystalGeo, crystalMat);
          crystal.position.set(laneX[safeLane], 0.9, z - 2.2);
          scene.add(crystal);
          items.push({ mesh: crystal, lane: safeLane, z: z - 2.2, type: "crystal" });
        }
      }

      let nextZ = -22;
      for (let i = 0; i < 28; i++) {
        spawnRow(nextZ);
        nextZ -= 8;
      }

      let laneIndex = 1;
      let laneTarget = laneX[1];
      let velocityY = 0;
      let score = 0;
      let speed = 16;
      let gameOver = true;

      const scoreEl = document.getElementById("score");
      const speedEl = document.getElementById("speed");
      const overlay = document.getElementById("overlay");
      const startButton = document.getElementById("startButton");

      function setOverlay(text, buttonText = "Nochmal spielen") {
        overlay.querySelector("p").textContent = text;
        startButton.textContent = buttonText;
        overlay.classList.remove("hidden");
      }

      function resetGame() {
        for (const item of items) scene.remove(item.mesh);
        items.length = 0;
        nextZ = -22;
        for (let i = 0; i < 28; i++) {
          spawnRow(nextZ);
          nextZ -= 8;
        }

        laneIndex = 1;
        laneTarget = laneX[1];
        player.position.set(0, 0, 3.2);
        velocityY = 0;
        score = 0;
        speed = 16;
        scoreEl.textContent = "0";
        speedEl.textContent = "1.0x";
        gameOver = false;
        overlay.classList.add("hidden");
      }

      function jump() {
        if (player.position.y <= 0.01) velocityY = 11.2;
      }

      function moveLane(delta) {
        laneIndex = Math.max(0, Math.min(2, laneIndex + delta));
        laneTarget = laneX[laneIndex];
      }

      let touchStartX = null;
      let touchMoved = false;

      window.addEventListener("touchstart", (event) => {
        if (event.touches.length !== 1 || gameOver) return;
        touchStartX = event.touches[0].clientX;
        touchMoved = false;
      });

      window.addEventListener("touchmove", (event) => {
        if (touchStartX == null || gameOver) return;
        const dx = event.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 26) {
          moveLane(dx > 0 ? 1 : -1);
          touchStartX = event.touches[0].clientX;
          touchMoved = true;
        }
      });

      window.addEventListener("touchend", () => {
        if (!gameOver && !touchMoved) jump();
        touchStartX = null;
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") moveLane(-1);
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") moveLane(1);
        if (event.key === " " || event.key === "ArrowUp") jump();
      });

      startButton.addEventListener("click", resetGame);

      function endGame() {
        gameOver = true;
        setOverlay(`Crash! Du hast ${score} Punkte erreicht. Bereit für einen weiteren Neon-Run?`);
      }

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.045);

        if (!gameOver) {
          speed += dt * 0.5;
          score += Math.floor(dt * (speed * 7));
          scoreEl.textContent = String(score);
          speedEl.textContent = `${(speed / 16).toFixed(1)}x`;

          player.position.x += (laneTarget - player.position.x) * Math.min(1, dt * 13);
          velocityY -= 22 * dt;
          player.position.y = Math.max(0, player.position.y + velocityY * dt);
          if (player.position.y === 0) velocityY = Math.max(velocityY, 0);

          player.rotation.y += dt * 3;
          trail.scale.setScalar(1 + Math.sin(performance.now() * 0.014) * 0.08);

          for (const segment of segments) {
            segment.position.z += speed * dt;
            if (segment.position.z > 30) segment.position.z -= segments.length * 31.5;
          }

          for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            item.z += speed * dt;
            item.mesh.position.z = item.z;

            if (item.type === "crystal") {
              item.mesh.rotation.y += dt * 5;
              item.mesh.position.y = 1 + Math.sin(performance.now() * 0.007 + i) * 0.22;
            }

            const zDist = Math.abs(item.z - player.position.z);
            const sameLane = Math.abs(item.mesh.position.x - player.position.x) < 1.25;

            if (zDist < 1.4 && sameLane) {
              if (item.type === "obstacle" && player.position.y < 1.1) {
                endGame();
                break;
              }

              if (item.type === "crystal") {
                score += 150;
                scene.remove(item.mesh);
                items.splice(i, 1);
                continue;
              }
            }

            if (item.z > 10) {
              scene.remove(item.mesh);
              items.splice(i, 1);
            }
          }

          while (items.length < 36) {
            spawnRow(nextZ);
            nextZ -= 8;
          }
        }

        const cameraTarget = new THREE.Vector3(player.position.x * 0.45, 2.6 + player.position.y * 0.35, player.position.z + 0.8);
        camera.position.lerp(new THREE.Vector3(cameraTarget.x, cameraTarget.y + 2, cameraTarget.z + 8.6), 0.1);
        camera.lookAt(cameraTarget);

        renderer.render(scene, camera);
      }

      animate();

      function onResize() {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      }

      addEventListener("resize", onResize);

      setOverlay("Tippe auf Start und tauche in den Neon-Himmel ein.", "Start");
    </script>
  </body>
</html>
